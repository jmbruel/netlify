<!DOCTYPE html>
{{- $language_code := site.LanguageCode | default "en-us" -}}
<html lang="{{$language_code}}" {{ if in site.Data.i18n.rtl.rtl $language_code }}dir="rtl"{{end}}>
  {{/*  <html lang="{{ .Site.LanguageCode }}" prefix="og: http://ogp.me/ns#">  */}}

{{ partial "site_head" . }}

<body>
  {{ partial "banner.html" . }}
  <main role="main">
    <article {{- if .Site.Params.Webslides.slideshow }} id="webslides" {{- if .Site.Params.Webslides.vertical }}
      class="vertical" {{- end -}}{{- end -}}>
      {{ block "main" . -}}{{- end }}
      </article>
  </main>

  {{ partial "footer.html" . }}
  {{ partial "webslides.html" . }}
</body>

</html>
